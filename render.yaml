services:
  # Backend Web Service
  - type: web
    name: gen-ai-backend
    plan: free
    env: node
    rootDir: MERN_AI_CONTENT-GENERATOR-BACKEND
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8090
      - key: MONGO_URI
        sync: false # Set in Render Dashboard
      - key: JWT_SECRET
        sync: false # Set in Render Dashboard
      - key: API_KEY
        sync: false # Set in Render Dashboard
      - key: RAZORPAY_KEY_ID
        sync: false # Set in Render Dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false # Set in Render Dashboard
      - key: CLIENT_URL
        value: https://ai-content-generator-frontend.vercel.app # Set this to your Vercel URL once deployed
